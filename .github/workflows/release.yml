# Release builds: eight per-platform binaries attached to a draft GitHub release.
#
# Triggered by pushing a version tag (v0.1.0, ...). The workflow_dispatch trigger
# exists so the whole pipeline can be exercised without cutting a release: a
# manual run performs the gates and builds but skips the release job.
#
# Gates mirror CLAUDE.md's bar: zero build/clippy warnings (RUSTFLAGS=-Dwarnings),
# all tests pass, and THIRD-PARTY-LICENSES.md matches the current dependency
# tree (regenerate-and-diff, the release gate described in CLAUDE.md). The
# corpus check (testfiles/) is local-only and gitignored, so it stays a manual
# pre-tag step.
#
# Platform notes:
# - Linux builds run on ubuntu-22.04 / ubuntu-22.04-arm so the binaries link
#   against glibc 2.35 and run on older distros; 24.04 runners would silently
#   raise the floor to 2.39.
# - The two *-unknown-linux-musl builds are fully static (no libc/loader
#   dependency), for systems whose glibc we can't rely on: aarch64 covers
#   minimal userspaces like CoreELEC/LibreELEC boxes (one binary spans old
#   vendor kernels (4.9) through current); x86_64 covers appliance NAS OSes
#   like Unraid, whose RAM-resident root also makes a drop-in static binary
#   the natural install format. Tests run natively on the matching runners
#   (static binaries execute fine on a glibc host).
# - GitHub retired the free Intel macOS runners, so x86_64-apple-darwin is
#   cross-compiled on the arm64 runner (Xcode ships both toolchains). Its tests
#   still execute there via Rosetta 2.
# - FreeBSD has no GitHub-hosted runner, so it can't join the matrix without
#   breaking its build-and-test-on-target rule; instead a separate job boots a
#   real FreeBSD VM (KVM on the Linux runner) and builds, tests, and packages
#   inside it. Rust comes from rustup, not pkg — the ports toolchain tracks
#   quarterly branches and can lag the crate's rust-version floor.
# - Windows shell integration (--install-shell) is Windows-only by design; the
#   other binaries build it out via cfg and need nothing here.
# - Archives are named by user-facing platform (matrix.name: linux-x64-static,
#   macos-arm64, ...), never raw target triples: the download audience is media
#   library users, to whom "x86_64-unknown-linux-musl" reads as a build error
#   ("unknown") and names the libc instead of the fact that matters (static vs
#   standard). The triple still keys the toolchain steps and build paths.

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  RUSTFLAGS: -Dwarnings

jobs:
  checks:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - name: Tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          if [ "$tag" != "$crate" ]; then
            echo "tag v$tag does not match Cargo.toml version $crate" >&2
            exit 1
          fi

      - name: Clippy (zero warnings)
        run: cargo clippy --release --all-targets

      - name: Tests
        run: cargo test --release

      - name: Third-party license attribution is current
        env:
          # -Dwarnings is our crate's bar; don't let it fail cargo-about's own build.
          RUSTFLAGS: ""
        run: |
          cargo install --locked --features cli cargo-about
          cargo about generate about.hbs -o THIRD-PARTY-LICENSES.md
          git diff --exit-code THIRD-PARTY-LICENSES.md

  build:
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: linux-x64
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            name: linux-arm64
            os: ubuntu-22.04-arm
          - target: aarch64-unknown-linux-musl
            name: linux-arm64-static
            os: ubuntu-22.04-arm
          - target: x86_64-unknown-linux-musl
            name: linux-x64-static
            os: ubuntu-22.04
          - target: aarch64-apple-darwin
            name: macos-arm64
            os: macos-latest
          - target: x86_64-apple-darwin
            name: macos-x64
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            name: windows-x64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      # The dependency tree is pure Rust, so rustc's self-contained musl mode
      # links the static binary without a musl sysroot; musl-gcc is installed
      # only as the link driver.
      - name: Install musl toolchain
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # Native on six of the seven; x86_64-apple-darwin runs under Rosetta 2.
      - name: Tests on target
        run: cargo test --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          version="${GITHUB_REF_NAME#v}"
          [ "$GITHUB_REF_TYPE" = "tag" ] || version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          name="hdrprobe-${version}-${{ matrix.name }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/hdrprobe" LICENSE THIRD-PARTY-LICENSES.md README.md docs/SCHEMA.md docs/MIGRATION-2.0.md docs/INTEGRATION-STDIN.md "$name/"
          tar czf "$name.tar.gz" "$name"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          if ($env:GITHUB_REF_TYPE -ne 'tag') {
            $version = (cargo metadata --no-deps --format-version 1 | ConvertFrom-Json).packages[0].version
          }
          $name = "hdrprobe-$version-${{ matrix.name }}"
          New-Item -ItemType Directory $name | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/hdrprobe.exe", LICENSE, THIRD-PARTY-LICENSES.md, README.md, docs/SCHEMA.md, docs/MIGRATION-2.0.md, docs/INTEGRATION-STDIN.md $name/
          Compress-Archive -Path $name -DestinationPath "$name.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: hdrprobe-${{ matrix.name }}
          path: |
            hdrprobe-*.tar.gz
            hdrprobe-*.zip
          if-no-files-found: error

  # FreeBSD: built, tested, and packaged inside a FreeBSD VM (see the platform
  # notes above). The prepare/run scripts are POSIX sh (usesh), and the working
  # tree — including the tar.gz the run step leaves behind — is rsynced back to
  # the host for the ordinary artifact upload.
  build-freebsd:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build, test, and package in a FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.3"
          usesh: true
          mem: 8192
          # RUSTFLAGS carries the workflow's -Dwarnings bar into the VM.
          envs: "RUSTFLAGS GITHUB_REF_NAME GITHUB_REF_TYPE"
          prepare: |
            pkg install -y curl jq
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          run: |
            . "$HOME/.cargo/env"
            cargo build --release
            cargo test --release
            version="${GITHUB_REF_NAME#v}"
            [ "$GITHUB_REF_TYPE" = "tag" ] || version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
            name="hdrprobe-${version}-freebsd-x64"
            mkdir "$name"
            cp target/release/hdrprobe LICENSE THIRD-PARTY-LICENSES.md README.md docs/SCHEMA.md docs/MIGRATION-2.0.md docs/INTEGRATION-STDIN.md "$name/"
            tar czf "$name.tar.gz" "$name"

      - uses: actions/upload-artifact@v7
        with:
          name: hdrprobe-freebsd-x64
          path: hdrprobe-*.tar.gz
          if-no-files-found: error

  # Draft release: the archives and a checksum file are attached, but nothing
  # is published until the draft is reviewed and released by hand.
  release:
    needs: [build, build-freebsd]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist
          sha256sum hdrprobe-* > SHA256SUMS

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --draft --verify-tag \
            --title "hdrprobe $GITHUB_REF_NAME" \
            dist/*
